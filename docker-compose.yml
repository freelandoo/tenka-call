services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenka
      POSTGRES_PASSWORD: tenka
      POSTGRES_DB: tenka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenka"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    depends_on:
      db:
        condition: service_healthy
    environment:
      AUTHENTICATION_API_KEY: dev-evolution-key
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://tenka:tenka@db:5432/tenka?schema=evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - evolutioninstances:/evolution/instances

volumes:
  pgdata:
  redisdata:
  evolutioninstances:
